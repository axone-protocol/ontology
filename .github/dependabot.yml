version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    assignees:
      - ccamel
    open-pull-requests-limit: 5
  - package-ecosystem: "pip"
    directory: "/script"
    schedule:
      interval: "daily"
    assignees:
      - ccamel
    open-pull-requests-limit: 5
